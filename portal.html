  <script>
    async function carregarTabela(url, tabelaId) {
      const response = await fetch(url);
      const data = await response.text();
      const linhas = data.split("\n").map(l => l.split(","));
      const tabela = document.getElementById(tabelaId);

      // Cabeçalho
      let header = "<tr>";
      linhas[0].forEach(col => header += `<th>${col}</th>`);
      header += "</tr>";
      tabela.innerHTML = header;

      // Linhas
      for (let i = 1; i < linhas.length; i++) {
        let row = "<tr>";
        linhas[i].forEach(col => row += `<td>${col}</td>`);
        row += "</tr>";
        tabela.innerHTML += row;
      }

      return linhas; // retorna os dados para usar no gráfico
    }

    async function carregarRanking(url) {
      const linhas = await carregarTabela(url, "tabelaRanking");

      for (let i = 1; i < linhas.length; i++) {
        nomes.push(linhas[i][0]);
        pontos.push(parseInt(linhas[i][1]));
