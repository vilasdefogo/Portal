<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Portal do Clã - Vilas de Fogo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1c1c1c;
      color: #fff;
    }
    header {
      background: #b22222;
      padding: 15px;
      text-align: center;
    }
    header h1 {
      margin: 0;
      font-size: 28px;
      color: #ffd700;
    }
    nav {
      background: #333;
      display: flex;
      justify-content: center;
      padding: 10px;
    }
    nav a {
      color: #fff;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }
    nav a:hover {
      color: #ffd700;
    }
    main {
      padding: 20px;
    }
    section {
      margin-bottom: 30px;
      background: #2c2c2c;
      padding: 15px;
      border-radius: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid #444;
      padding: 8px;
      text-align: center;
    }
    th {
      background: #444;
    }
  </style>
</head>
<body>
  <header>
    <h1>🔥 Vilas de Fogo 🔥</h1>
    <p>Unidos pela chama da vitória</p>
  </header>

  <nav>
    <a href="#membros">👥 Membros</a>
    <a href="#guerras">⚔️ Guerras</a>
    <a href="#eventos">📅 Eventos</a>
    <a href="#ranking">🏆 Ranking</a>
  </nav>

  <main>
    <section id="membros">
      <h2>Membros do Clã</h2>
      <table id="tabelaMembros"></table>
    </section>

    <section id="guerras">
      <h2>Guerras</h2>
      <table id="tabelaGuerras"></table>
    </section>

    <section id="eventos">
      <h2>Eventos</h2>
      <table id="tabelaEventos"></table>
    </section>

    <section id="ranking">
      <h2>Ranking Interno</h2>
      <table id="tabelaRanking"></table>
    </section>
  </main>

  <script>
    async function carregarTabela(url, tabelaId) {
      const response = await fetch(url);
      const data = await response.text();
      const linhas = data.split("\n").map(l => l.split(","));
      const tabela = document.getElementById(tabelaId);

      // Cabeçalho
      let header = "<tr>";
      linhas[0].forEach(col => header += `<th>${col}</th>`);
      header += "</tr>";
      tabela.innerHTML = header;

      // Linhas
      for (let i = 1; i < linhas.length; i++) {
        let row = "<tr>";
        linhas[i].forEach(col => row += `<td>${col}</td>`);
        row += "</tr>";
        tabela.innerHTML += row;
      }
    }

    // Substitua pelos links CSV de cada aba publicada
    carregarTabela("https://docs.google.com/spreadsheets/d/1M26yautpoDsd-INMmBKnLFZsy6a-hhQELh9ojGksIzc/edit?usp=sharing", "tabelaMembros");
    carregarTabela("LINK_DA_ABA_GUERRAS", "tabelaGuerras");
    carregarTabela("LINK_DA_ABA_EVENTOS", "tabelaEventos");
    carregarTabela("LINK_DA_ABA_RANKING", "tabelaRanking");
  </script>
</body>
</html>
