<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Portal do Clã - Vilas de Fogo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }
    header {
      background: #ff6600;
      color: #fff;
      padding: 15px;
      text-align: center;
    }
    nav {
      width: 200px;
      background: #333;
      color: #fff;
      position: fixed;
      top: 0;
      bottom: 0;
      padding-top: 20px;
    }
    nav a {
      display: block;
      color: #fff;
      padding: 10px;
      text-decoration: none;
    }
    nav a:hover {
      background: #444;
    }
    main {
      margin-left: 220px;
      padding: 20px;
    }
    section {
      margin-bottom: 30px;
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <header>
    <h1>Portal do Clã - Vilas de Fogo</h1>
  </header>

  <nav>
    <a href="#membros">👥 Membros</a>
    <a href="#guerras">⚔️ Guerras</a>
    <a href="#eventos">📅 Eventos</a>
    <a href="#ranking">🏆 Ranking</a>
  </nav>

  <main>
    <section id="membros">
      <h2>Membros do Clã</h2>
      <p>Aqui vamos integrar a tabela de membros do Google Sheets.</p>
    </section>

    <section id="guerras">
      <h2>Guerras</h2>
      <p>Lista de guerras e equipes escaladas.</p>
    </section>

    <section id="eventos">
      <h2>Eventos</h2>
      <p>Calendário de treinos e desafios internos.</p>
    </section>

    <section id="ranking">
      <h2>Ranking Interno</h2>
      <p>Ranking atualizado dos jogadores.</p>
    </section>
  </main>
</body>
</html>
