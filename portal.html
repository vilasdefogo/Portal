<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <meta charset="UTF-8">
  <title>Portal do Clã - Vilas de Fogo</title>
  <style>
    
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1c1c1c;
      color: #fff;
    }
    header {
      background: #6e1303;
      padding: 5px;
      text-align: ;
    }
    header h1 {
      margin: 0;
      font-size: 28px;
      color: #ffd700;
    }
    nav {
      background: #333;
      display: flex;
      justify-content: center;
      padding: 10px;
    }
    nav a {
      color: #fff;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }
    nav a:hover {
      color: #ffd700;
    }
    main {
      padding: 20px;
    }
    section {
      margin-bottom: 30px;
      background: #2c2c2c;
      padding: 15px;
      border-radius: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid #444;
      padding: 8px;
      text-align: center;
    }
    th {
      background: #444;
    }
    #graficoRanking {
      max-width: 300px;   /* largura máxima */
      max-height: 150px;  /* altura máxima */
      margin: 20px auto;  /* centralizado */
      display: block;
    }
    .logo-fogo {
  max-width: 500px;
  display: block;
  margin: 0 auto;
  animation: pulsarFogo 4s infinite;
  filter: drop-shadow(0 0 10px #ff6600) drop-shadow(0 0 20px #ff3300);
}

@keyframes pulsarFogo {
  0% {
    filter: drop-shadow(0 0 5px #ff6600) drop-shadow(0 0 10px #ff3300);
    transform: scale(1);
  }
  50% {
    filter: drop-shadow(0 0 20px #ffd700) drop-shadow(0 0 30px #ff6600);
    transform: scale(1.05);
  }
  100% {
    filter: drop-shadow(0 0 5px #ff6600) drop-shadow(0 0 10px #ff3300);
    transform: scale(1);
  }
}

  </style>
</head>
<body>
<header>
  <img src="assets/imagens/LOGO2.png" alt="" class="logo-fogo">
</header>




  <nav>
    <a href="#membros">👥 Membros</a>
    <a href="#guerras">⚔️ Guerras</a>
    <a href="#eventos">📅 Eventos</a>
    <a href="#ranking">🏆 Ranking</a>
  </nav>

  <main>
    <section id="membros">
      <h2>Membros do Clã</h2>
      <table id="tabelaMembros"></table>
    </section>

    <section id="guerras">
      <h2>Guerras</h2>
      <table id="tabelaGuerras"></table>
    </section>

    <section id="eventos">
      <h2>Eventos</h2>
      <table id="tabelaEventos"></table>
    </section>

    <section id="ranking">
      <h2>Ranking Interno</h2>
      <table id="tabelaRanking"></table>
      <canvas id="graficoRanking"></canvas>
    </section>
  </main>

  <script>
    async function carregarTabela(url, tabelaId) {
      const response = await fetch(url);
      const data = await response.text();
      const linhas = data.split("\n").map(l => l.split(","));
      const tabela = document.getElementById(tabelaId);

      // Cabeçalho
      let header = "<tr>";
      linhas[0].forEach(col => header += `<th>${col}</th>`);
      header += "</tr>";
      tabela.innerHTML = header;

      // Linhas
      for (let i = 1; i < linhas.length; i++) {
        let row = "<tr>";
        linhas[i].forEach(col => row += `<td>${col}</td>`);
        row += "</tr>";
        tabela.innerHTML += row;
      }

      return linhas; // retorna os dados para usar no gráfico
    }

    async function carregarRanking(url) {
      const linhas = await carregarTabela(url, "tabelaRanking");

      const nomes = [];
      const pontos = [];

      for (let i = 1; i < linhas.length; i++) {
        nomes.push(linhas[i][0]);
        pontos.push(parseInt(linhas[i][1]));
      }

      const ctx = document.getElementById("graficoRanking").getContext("2d");

      new Chart(ctx, {
        type: "bar",
        data: {
          labels: nomes,
          datasets: [{
            label: "Pontos",
            data: pontos,
            backgroundColor: [
              "#ff6600", "#ffd700", "#00ccff", "#33cc33", "#cc33ff"
            ]
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false }
          },
          animation: {
            duration: 1500,
            easing: "easeOutBounce"
          }
        }
      });
    }

    // Substitua pelos links CSV de cada aba publicada
    carregarTabela("https://docs.google.com/spreadsheets/d/e/2PACX-1vTfXdUtm1B53gPy7DY3wWI1GHr3Ucg-cFHmhcMeWIL-E_v3pbDMUhz0N2S72yYYnygYRBb171d0p98y/pub?gid=760823650&single=true&output=csv", "tabelaMembros");
    carregarTabela("LINK_DA_ABA_GUERRAS", "tabelaGuerras");
    carregarTabela("LINK_DA_ABA_EVENTOS", "tabelaEventos");
    carregarRanking("https://docs.google.com/spreadsheets/d/e/2PACX-1vTfXdUtm1B53gPy7DY3wWI1GHr3Ucg-cFHmhcMeWIL-E_v3pbDMUhz0N2S72yYYnygYRBb171d0p98y/pub?gid=1227128405&single=true&output=csv");
  </script>
</body>
</html>
