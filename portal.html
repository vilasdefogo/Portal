   <script>
    // -------------------------------------------------------------------------AVISOS----------------------------------------------------------- //
     
 // Modal abrir/fechar
const modal = document.getElementById("modalAviso");
const abrir = document.getElementById("abrirAviso");
const fechar = document.getElementById("fecharAviso");

abrir.onclick = () => modal.style.display = "block";
fechar.onclick = () => modal.style.display = "none";
window.onclick = (event) => { if (event.target == modal) modal.style.display = "none"; };

// Enviar aviso para WebApp
async function enviarAviso() {
  const autor = document.getElementById("autor").value;
  const mensagem = document.getElementById("mensagem").value;

  if (autor && mensagem) {
    await fetch("https://script.google.com/macros/s/AKfycbzpYbPBlsHpfUK-MSK7s3umLW8Z35Hpjt17tqCtZU8ndJ6IJDlsSYWc6fSlsKKVCUGQ4w/exec", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ autor, mensagem })
    });
    alert("Aviso enviado com sucesso!");
    document.getElementById("autor").value = "";
    document.getElementById("mensagem").value = "";
    modal.style.display = "none";
  } else {
    alert("Preencha todos os campos!");
  }
}

// Carregar avisos da aba publicada como CSV
async function carregarAvisos() {
  const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTfXdUtm1B53gPy7DY3wWI1GHr3Ucg-cFHmhcMeWIL-E_v3pbDMUhz0N2S72yYYnygYRBb171d0p98y/pub?gid=1571891642&single=true&output=csv"; // link da aba Avisos publicada
  const response = await fetch(url);
  const data = await response.text();
  const linhas = data.split("\n").map(l => l.split(","));

  let html = "<ul>";
  for (let i = 1; i < linhas.length; i++) {
    html += `<li><strong>${linhas[i][0]}:</strong> ${linhas[i][1]} <em>(${linhas[i][2]})</em></li>`;
  }
  html += "</ul>";
  document.getElementById("lista-avisos").innerHTML = html;
}

carregarAvisos();
setInterval(carregarAvisos, 10000);


 
 // -------------------------------------------------------------------------TABELAS----------------------------------------------------------- //
    
     carregarTabela("LINK_CSV_EVENTOS", "tabelaEventos");
 
    async function carregarTabela(url, tabelaId) {
      const response = await fetch(url);
      const data = await response.text();
      const linhas = data.split("\n").map(l => l.split(","));
      const tabela = document.getElementById(tabelaId);

      // Cabeçalho
      let header = "<tr>";
      linhas[0].forEach(col => header += `<th>${col}</th>`);
      header += "</tr>";
      tabela.innerHTML = header;

      // Linhas
      for (let i = 1; i < linhas.length; i++) {
        let row = "<tr>";
        linhas[i].forEach(col => row += `<td>${col}</td>`);
        row += "</tr>";
        tabela.innerHTML += row;
      }

      return linhas; // retorna os dados para usar no gráfico
    }

    async function carregarRanking(url) {
      const linhas = await carregarTabela(url, "tabelaRanking");

      const nomes = [];
      const pontos = [];

      for (let i = 1; i < linhas.length; i++) {
        nomes.push(linhas[i][0]);
        pontos.push(parseInt(linhas[i][1]));
      }
    }
      

    // Substitua pelos links CSV de cada aba publicada
    carregarTabela("https://docs.google.com/spreadsheets/d/e/2PACX-1vTfXdUtm1B53gPy7DY3wWI1GHr3Ucg-cFHmhcMeWIL-E_v3pbDMUhz0N2S72yYYnygYRBb171d0p98y/pub?gid=760823650&single=true&output=csv", "tabelaMembros");
    carregarTabela("https://docs.google.com/spreadsheets/d/e/2PACX-1vTfXdUtm1B53gPy7DY3wWI1GHr3Ucg-cFHmhcMeWIL-E_v3pbDMUhz0N2S72yYYnygYRBb171d0p98y/pub?gid=956780593&single=true&output=csv", "tabelaBatalhas");
    carregarTabela("https://docs.google.com/spreadsheets/d/e/2PACX-1vTfXdUtm1B53gPy7DY3wWI1GHr3Ucg-cFHmhcMeWIL-E_v3pbDMUhz0N2S72yYYnygYRBb171d0p98y/pub?gid=757280293&single=true&output=csv", "tabelaEventos");
    carregarRanking("https://docs.google.com/spreadsheets/d/e/2PACX-1vTfXdUtm1B53gPy7DY3wWI1GHr3Ucg-cFHmhcMeWIL-E_v3pbDMUhz0N2S72yYYnygYRBb171d0p98y/pub?gid=1227128405&single=true&output=csv");
    carregarTabela("https://docs.google.com/spreadsheets/d/e/2PACX-1vTfXdUtm1B53gPy7DY3wWI1GHr3Ucg-cFHmhcMeWIL-E_v3pbDMUhz0N2S72yYYnygYRBb171d0p98y/pub?gid=554377573&single=true&output=csv", "tabelaEquipess");
