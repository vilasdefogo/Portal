<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Portal Vilas de Fogo - Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: radial-gradient(circle, #440f0f 10%, #220707 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;     /* Centro vertical */
      min-height: 100vh;       /* Ocupa 100% da altura do ecrã */
      background-image: url("assets/imagens/background.png"); /* sua imagem com a chama */
  background-repeat: no-repeat;
  background-position: center center;
  background-size: cover;
     
      align-items: center;
      height: 100vh;
    }
    .login-box {
      background: rgba(10, 10, 10, 0.75); /* leve transparência para ver o relevo atrás */
      padding: 40px;
      border-radius: 8px;
      width: 500px;
      text-align: center;
       box-shadow: 0 0 40px rgba(0, 0, 0, 1); /* sombra para destacar o relevo */
    }
    input {
      background: #470601;
       color: #fff;
      width: 90%;
      padding: 10px;
      margin: 5px 0;
      border: 1px #fff;
      border-radius: 5px;
    }
    button {
     width: 50%;
      padding: 10px;
      background: #730303;
      border: none;
      border-radius: 4px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #e65c00;
    }
    .logo-fogo {
  flex-direction: column;
  max-width: 450px;
  display: flex;
  margin: 0 auto;
  animation: pulsarFogo 4s infinite;
  filter: drop-shadow(0 0 10px #ff6600) drop-shadow(0 0 20px #ff3300);
}

@keyframes pulsarFogo {
  0% {
    filter: drop-shadow(0 0 5px #ff6600) drop-shadow(0 0 10px #ff3300);
    transform: scale(1);
  }
  50% {
    filter: drop-shadow(0 0 20px #ffd700) drop-shadow(0 0 30px #ff6600);
    transform: scale(1.05);
  }
  100% {
    filter: drop-shadow(0 0 5px #ff6600) drop-shadow(0 0 10px #ff3300);
    transform: scale(1);
  }
}
 

.login-container img {
  max-width: 12px;   /* tamanho do logo */
  margin-bottom: 0px; /* espaço entre logo e caixa */
}

.login-container input {
   background: #ff6600
  display: block;
  width: 90%;
  margin: 10px auto;
  padding: 8px;
  border-radius: 4px;
  border: none;
}

.login-container button {
  background: #690808;
  color: #fff;
  border: none;
  padding: 10px;
  width: 50%;
  border-radius: 4px;
  font-weight: bold;
  cursor: pointer;
}

.login-container button:hover {
  background: #ffd700;
  color: #000;
}
    /* Responsividade */
@media (max-width: 400px) {
  .login-container {
    margin: 0 auto; /* espaço lateral no celular */
    padding: 20px;
     width: auto; /* Garante que a caixa ocupe a largura disponível */
  }
    input, button {
    font-size: 16px;
    padding: 12px;
  }
}
    /* Tablets e Telemóveis Grandes (Landscape) - entre 481px e 768px */
@media (min-width: 481px) and (max-width: 768px) {
  .login-container {
    max-width: 400px; /* Limita a largura para não ficar esticado no tablet */
    margin: 0 auto;   /* Centra a caixa no ecrã */
    padding: 30px;
  }
}

    /*============================================================= Estilo do popup de cadastro =============================================*/
    .login-extra {
  margin-top: 15px;
  text-align: center;
}

.login-extra a {
  color: #ff6600;
  font-weight: bold;
  cursor: pointer;
  text-decoration: none;
}

.login-extra a:hover {
  text-decoration: underline;
}
/*=================================================================================================================================*/
    .modal {
  display: none; /* começa escondido */
  position: fixed;
  z-index: 1000; /* fica acima de tudo */
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.7); /* fundo escuro translúcido */
}

.modal-conteudo {
  background-color: #222;
  margin: 10% auto;
  padding: 20px;
  border: 2px solid #ff6600;
  width: 300px;
  border-radius: 8px;
  color: #fff;
  text-align: center;
  animation: aparecer 0.3s ease-out; /* animação suave */
}

@keyframes aparecer {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.fechar {
  float: right;
  font-size: 24px;
  cursor: pointer;
  color: #ff6600;
}
    .erro {
  color: #ff4444;
  font-weight: bold;
  margin-bottom: 10px;
  display: none; /* começa escondido */
}


</style>
</head>
  <body>
    <div class="login-box">
   <header> <img src="assets/imagens/LOGO2.png" alt="Vilas de Fogo" class="logo-fogo">
  </header>
    <h4>Login do Clã</h4>
    <input type="text" id="username" placeholder="Digite seu nome">
    <input type="password" id="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
    <p id="msg"></p>
  </div>
    <div class="login-extra">
  <p>Não tem conta? 
    <a href="#" id="abrirCadastro">Cadastrar</a>
  </p>

</div>
      <div id="modalCadastro" class="modal">
  <div class="modal-conteudo">
    <span id="fecharCadastro" class="fechar">&times;</span>
    <h2>Cadastrar Membro</h2>
    
    <!-- Mensagem de erro -->
    <div id="mensagemErro" class="erro"></div>
    
    <input type="text" id="nomeCadastro" placeholder="Seu nome">
    <input type="text" id="posicaoCadastro" placeholder="Sua posição">
    <input type="password" id="senhaCadastro" placeholder="Crie uma senha">
    <input type="file" id="imagemCadastro" accept="image/*">
    <button onclick="enviarCadastro()">Enviar</button>
  </div>
</div>

</div>

<script>
   async function carregarMembros() {
  const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTfXdUtm1B53gPy7DY3wWI1GHr3Ucg-cFHmhcMeWIL-E_v3pbDMUhz0N2S72yYYnygYRBb171d0p98y/pub?gid=0&single=true&output=csv"; // substitua pelo link CSV
  const response = await fetch(url);
  const data = await response.text();

  const linhas = data.split("\n").map(l => l.split(","));
  // Ignora cabeçalho
  const membros = linhas.slice(1).map(l => ({nome: l[0], senha: l[1]}));
  return membros;
}

async function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  const membros = await carregarMembros();
  const autorizado = membros.find(m => m.nome === user && m.senha === pass);

  if (autorizado) {
    window.location.href = "portal.html";
  } else {
    document.getElementById("msg").innerText = "Acesso negado!";
  }
}
  // Abrir/fechar modal de cadastro
const modalCadastro = document.getElementById("modalCadastro");
const abrirCadastro = document.getElementById("abrirCadastro");
const fecharCadastro = document.getElementById("fecharCadastro");

abrirCadastro.onclick = (e) => {
  e.preventDefault();
  modalCadastro.style.display = "block"; // mostra o popup
};

fecharCadastro.onclick = () => {
  modalCadastro.style.display = "none"; // fecha ao clicar no X
};

window.onclick = (event) => {
  if (event.target == modalCadastro) {
    modalCadastro.style.display = "none"; // fecha ao clicar fora
  }
};
async function enviarCadastro() {
  const nome = document.getElementById("nomeCadastro").value.trim();
  const posicao = document.getElementById("posicaoCadastro").value.trim();
  const senha = document.getElementById("senhaCadastro").value.trim();
  const arquivo = document.getElementById("imagemCadastro").files[0];
  const mensagemErro = document.getElementById("mensagemErro");

  let faltando = [];

  if (!nome) faltando.push("Nome");
  if (!posicao) faltando.push("Posição");
  if (!senha) faltando.push("Senha");
  if (!arquivo) faltando.push("Imagem");

  if (faltando.length > 0) {
    mensagemErro.style.display = "block";
    mensagemErro.innerText = "Preencher todos os campos! Faltando: " + faltando.join(", ");
    return; // não envia se faltar algo
  }

  // Se tudo preenchido, envia
  const formData = new FormData();
  formData.append("nome", nome);
  formData.append("posicao", posicao);
  formData.append("senha", senha);
  formData.append("imagem", arquivo);

  await fetch("URL_DO_SEU_WEBAPP", {
    method: "POST",
    body: formData
  });

  alert("Cadastro realizado com sucesso!");
  document.getElementById("modalCadastro").style.display = "none"; // fecha popup
}




  </script>
</body>
</html>
