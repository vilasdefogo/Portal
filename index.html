<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Portal Vilas de Fogo - Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #222;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-box {
      background: #333;
      padding: 20px;
      border-radius: 8px;
      width: 300px;
      text-align: center;
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #ff6600;
      border: none;
      border-radius: 4px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #ff8533;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Login do Clã</h2>
    <input type="text" id="username" placeholder="Digite seu nome">
    <input type="password" id="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
    <p id="msg"></p>
  </div>

  <script>
   async function carregarMembros() {
  const url = "LINK_DA_PLANILHA_PUBLICADA"; // substitua pelo link CSV
  const response = await fetch(url);
  const data = await response.text();

  const linhas = data.split("\n").map(l => l.split(","));
  // Ignora cabeçalho
  const membros = linhas.slice(1).map(l => ({nome: l[0], senha: l[1]}));
  return membros;
}

async function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  const membros = await carregarMembros();
  const autorizado = membros.find(m => m.nome === user && m.senha === pass);

  if (autorizado) {
    window.location.href = "portal.html";
  } else {
    document.getElementById("msg").innerText = "Acesso negado!";
  }
}

  </script>
</body>
</html>
