<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Portal Vilas de Fogo - Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: radial-gradient(circle, #440f0f 10%, #220707 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background-image: url("assets/imagens/background.png"); /* sua imagem com a chama */
  background-repeat: no-repeat;
  background-position: center center;
  background-size: cover;
     
      align-items: center;
      height: 100vh;
    }
    .login-box {
      background: rgba(10, 10, 10, 0.75); /* leve transparência para ver o relevo atrás */
      padding: 40px;
      border-radius: 8px;
      width: 500px;
      text-align: center;
       box-shadow: 0 0 40px rgba(0, 0, 0, 10.56); /* sombra para destacar o relevo */
    }
    input {
      background: #000;
       color: #fff;
      width: 90%;
      padding: 10px;
      margin: 5px 0;
      border: 1px solid #fff;
      border-radius: 5px;
    }
    button {
     width: 50%;
      padding: 10px;
      background: #ff6600;
      border: none;
      border-radius: 4px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #e65c00;
    }
    .logo-fogo {
  flex-direction: column;
  max-width: 450px;
  display: flex;
  margin: 0 auto;
  animation: pulsarFogo 4s infinite;
  filter: drop-shadow(0 0 10px #ff6600) drop-shadow(0 0 20px #ff3300);
}

@keyframes pulsarFogo {
  0% {
    filter: drop-shadow(0 0 5px #ff6600) drop-shadow(0 0 10px #ff3300);
    transform: scale(1);
  }
  50% {
    filter: drop-shadow(0 0 20px #ffd700) drop-shadow(0 0 30px #ff6600);
    transform: scale(1.05);
  }
  100% {
    filter: drop-shadow(0 0 5px #ff6600) drop-shadow(0 0 10px #ff3300);
    transform: scale(1);
  }
}

  </style>


<body>
 
  <div class="login-box">
   <header> <img src="assets/imagens/LOGO2.png" alt="Vilas de Fogo" class="logo-fogo">
  </header>
    <h4>Login do Clã</h4>
    <input type="text" id="username" placeholder="Digite seu nome">
    <input type="password" id="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
    <p id="msg"></p>
  </div>

  <script>
    .login-container {
  background: rgba(44, 44, 44, 0.85); /* leve transparência para ver o relevo atrás */
  padding: 10px;
  border-radius: 8px;
  width: 300px;
  margin: 40px auto;
  text-align: center;
  box-shadow: 0 0 30px rgba(0, 0, 0, 0.6); /* sombra para destacar o relevo */
}

.login-container img {
  max-width: 12px;   /* tamanho do logo */
  margin-bottom: 0px; /* espaço entre logo e caixa */
}

.login-container input {
   background: #ff6600
  display: block;
  width: 90%;
  margin: 10px auto;
  padding: 8px;
  border-radius: 4px;
  border: none;
}

.login-container button {
  background: #ff6600;
  color: #fff;
  border: none;
  padding: 10px;
  width: 50%;
  border-radius: 4px;
  font-weight: bold;
  cursor: pointer;
}

.login-container button:hover {
  background: #ffd700;
  color: #000;
}

   async function carregarMembros() {
  const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTfXdUtm1B53gPy7DY3wWI1GHr3Ucg-cFHmhcMeWIL-E_v3pbDMUhz0N2S72yYYnygYRBb171d0p98y/pub?gid=0&single=true&output=csv;" // substitua pelo link CSV
  const response = await fetch(url);
  const data = await response.text();

  const linhas = data.split("\n").map(l => l.split(","));
  // Ignora cabeçalho
  const membros = linhas.slice(1).map(l => ({nome: l[0], senha: l[1]}));
  return membros;
}

async function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  const membros = await carregarMembros();
  const autorizado = membros.find(m => m.nome === user && m.senha === pass);

  if (autorizado) {
    window.location.href = "portal.html";
  } else {
    document.getElementById("msg").innerText = "Acesso negado!";
  }
}

  </script>
</body>
</html>
