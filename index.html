<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Portal Vilas de Fogo - Login</title>
  <style>
    header {
      align-items: flex-start;
    }
    body {
      font-family: Arial, sans-serif;
      background: #222;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 10vh;
    }
    .login-box {
      background: #333;
      padding: 20px;
      border-radius: 8px;
      width: 300px;
      text-align: center;
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #ff6600;
      border: none;
      border-radius: 4px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #ff8533;
    }
    .logo-fogo {
  max-width: 400px;
  display: block;
  margin: 0 auto;
  animation: pulsarFogo 2s infinite;
  filter: drop-shadow(0 0 10px #ff6600) drop-shadow(0 0 20px #ff3300);
}

@keyframes pulsarFogo {
  0% {
    filter: drop-shadow(0 0 5px #ff6600) drop-shadow(0 0 10px #ff3300);
    transform: scale(1);
  }
  50% {
    filter: drop-shadow(0 0 20px #ffd700) drop-shadow(0 0 30px #ff6600);
    transform: scale(1.05);
  }
  100% {
    filter: drop-shadow(0 0 5px #ff6600) drop-shadow(0 0 10px #ff3300);
    transform: scale(1);
  }
}

  </style>


<body>
   <header>
  <img src="assets/imagens/LOGO2.png" alt="Vilas de Fogo" class="logo-fogo">
  <p>Unidos pela chama da vitória</p>
</header>
  
  <div class="login-box">
  
    <h2>Login do Clã</h2>
    <input type="text" id="username" placeholder="Digite seu nome">
    <input type="password" id="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
    <p id="msg"></p>
  </div>

  <script>
    .login-container {
  background: #2c2c2c;
  padding: 20px;
  border-radius: 8px;
  width: 300px;
  margin: 50px auto;
  text-align: center;
}

.login-container img {
  max-width: 120px;   /* tamanho do logo */
  margin-bottom: 15px; /* espaço entre logo e caixa */
}

.login-container input {
  display: block;
  width: 90%;
  margin: 10px auto;
  padding: 8px;
  border-radius: 4px;
  border: none;
}

.login-container button {
  background: #ff6600;
  color: #fff;
  border: none;
  padding: 10px;
  width: 100%;
  border-radius: 4px;
  font-weight: bold;
  cursor: pointer;
}

.login-container button:hover {
  background: #ffd700;
  color: #000;
}

   async function carregarMembros() {
  const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTfXdUtm1B53gPy7DY3wWI1GHr3Ucg-cFHmhcMeWIL-E_v3pbDMUhz0N2S72yYYnygYRBb171d0p98y/pub?gid=0&single=true&output=csv; // substitua pelo link CSV
  const response = await fetch(url);
  const data = await response.text();

  const linhas = data.split("\n").map(l => l.split(","));
  // Ignora cabeçalho
  const membros = linhas.slice(1).map(l => ({nome: l[0], senha: l[1]}));
  return membros;
}

async function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  const membros = await carregarMembros();
  const autorizado = membros.find(m => m.nome === user && m.senha === pass);

  if (autorizado) {
    window.location.href = "portal.html";
  } else {
    document.getElementById("msg").innerText = "Acesso negado!";
  }
}

  </script>
</body>
</html>
