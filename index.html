<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Portal Vilas de Fogo - Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #222;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-box {
      background: #333;
      padding: 20px;
      border-radius: 8px;
      width: 300px;
      text-align: center;
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #ff6600;
      border: none;
      border-radius: 4px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #ff8533;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Login do Clã</h2>
    <input type="text" id="username" placeholder="Digite seu nome">
    <input type="password" id="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
    <p id="msg"></p>
  </div>

  <script>
    // Lista de membros autorizados
    const membrosAutorizados = ["Bruno", "Carlos", "Ana"];

    function login() {
      const user = document.getElementById("username").value;
      const pass = document.getElementById("password").value;

      if (membrosAutorizados.includes(user) && pass === "clan123") {
        window.location.href = "portal.html"; // redireciona para o portal
      } else {
        document.getElementById("msg").innerText = "Acesso negado!";
      }
    }
  </script>
</body>
</html>
