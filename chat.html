<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - Vilas de Fogo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Chat dos Membros</h1>
    <nav>
      <a href="portal.html">Portal</a>
      <a href="membros.html">Membros</a>
      <a href="batalhas.html">Batalhas</a>
      <a href="eventos.html">Eventos</a>
      <a href="ranking.html">Ranking</a>
      <a href="equipes.html">Equipes</a>
      <a href="login.html" class="btn-sair">Sair</a>
    </nav>
  </header>

  <main>
    <div id="chat">
      <div id="mensagens"></div>
      <input type="text" id="entrada" placeholder="Digite sua mensagem">
      <button onclick="enviarMensagem()">Enviar</button>
    </div>
  </main>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>
  <script>
    // 🔹 Configuração do Firebase (copie do seu projeto no Firebase Console)
    const firebaseConfig = {
      apiKey: "SUA_API_KEY",
      authDomain: "SEU_PROJECT.firebaseapp.com",
      databaseURL: "https://SEU_PROJECT.firebaseio.com",
      projectId: "SEU_PROJECT",
      storageBucket: "SEU_PROJECT.appspot.com",
      messagingSenderId: "SENDER_ID",
      appId: "APP_ID"
    };

    // Inicializa Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const mensagensDiv = document.getElementById("mensagens");
    const entrada = document.getElementById("entrada");

    function enviarMensagem() {
      const texto = entrada.value;
      if (texto.trim() !== "") {
        db.ref("mensagens").push({
          usuario: "Bruno", // depois você pode trocar pelo nome logado
          texto: texto
        });
        entrada.value = "";
      }
    }

    // Escuta mensagens em tempo real
    db.ref("mensagens").on("child_added", snapshot => {
      const msg = snapshot.val();
      const p = document.createElement("p");
      p.textContent = msg.usuario + ": " + msg.texto;
      mensagensDiv.appendChild(p);
      mensagensDiv.scrollTop = mensagensDiv.scrollHeight;
    });
  </script>
</body>
</html>
