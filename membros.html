 <body>
   <header>
   <img src="assets/imagens/LOGO2.png" alt="Logo Fogo" class="logo-fogo">
   </header>
   
   <main>
     
  
  <h2 class="titulo-bady">Membros do Clã</h2>
  <div id="lista-membros" class="membros-container"></div>

<div class="atualizar-foto">
  <h3>Atualizar minha Foto</h3>
  <input type="text" id="upNome" placeholder="Seu Nome">
  <input type="password" id="upSenha" placeholder="Sua Senha">
  <input type="text" id="upLink" placeholder="Link da Imagem (URL)">
  <button onclick="atualizarFoto()">Atualizar Perfil</button>
</div>

   </main>
   <script>


  //===========================================================================================================================================//  
 async function carregarMembros() {
  // O teu link CSV público
  const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTfXdUtm1B53gPy7DY3wWI1GHr3Ucg-cFHmhcMeWIL-E_v3pbDMUhz0N2S72yYYnygYRBb171d0p98y/pub?gid=760823650&single=true&output=csv";
  
  try {
    const response = await fetch(url);
    const data = await response.text();
    
    // Divide por linhas e remove as que estão em branco
    const linhas = data.split(/\r?\n/).filter(l => l.trim() !== "");

    let html = "";

    // Começa em 1 para saltar o cabeçalho (Nome, Posição, Imagem)
    for (let i = 1; i < linhas.length; i++) {
      const colunas = linhas[i].split(",");
      
      // Só cria o card se a linha tiver pelo menos Nome e Posição
      if (colunas.length >= 2) {
        const nome = colunas[0].replace(/"/g, "").trim();
        const posicao = colunas[1].replace(/"/g, "").trim();
        
        // A imagem está na coluna 3 (índice 2 no JavaScript)
        let imagem = colunas[2] ? colunas[2].replace(/"/g, "").trim() : "";

        // Se o link for inválido ou vazio, usa uma imagem padrão
        if (!imagem || imagem.length < 10) {
          imagem = "https://placeholder.com";
        }

        html += `
  <div class="membro-card">
    <img src="${imagem}" alt="${nome}" class="membro-avatar" referrerpolicy="no-referrer">
    <h3>${nome}</h3>
    <p>Posição: ${posicao}</p>
  </div>
`;html += `
  <div class="membro-card">
    <img src="${imagem}" 
         alt="${nome}" 
         class="membro-avatar" 
         referrerpolicy="no-referrer"
         onerror="this.src='https://flaticon.com'; console.log('Erro ao carregar imagem do Drive');">
    <h3>${nome}</h3>
    <p>Posição: ${posicao}</p>
  </div>
`;


      }
    }
    
    document.getElementById("lista-membros").innerHTML = html;

  } catch (erro) {
    console.error("Erro crítico:", erro);
    document.getElementById("lista-membros").innerHTML = "<p>Erro ao carregar a lista.</p>";
  }
}

// Chama a função ao carregar a página
carregarMembros();


    //==========================================================================carregar foto================================================//
    async function atualizarFoto() {
  const nome = document.getElementById("upNome").value;
  const senha = document.getElementById("upSenha").value;
  let linkOriginal = document.getElementById("upLink").value.trim();

  if (!nome || !senha || !linkOriginal) return alert("Preencha tudo!");

  let linkConvertido = linkOriginal;

  // VERIFICAÇÃO E CONVERSÃO DO LINK DRIVE
  if (linkOriginal.includes("://google.com")) {
      // Extrai o ID do arquivo usando regex
      const idMatch = linkOriginal.match(/\/d\/([^\/]+)/) || linkOriginal.match(/id=([^&]+)/);
      if (idMatch && idMatch[1]) {
          const id = idMatch[1];
          linkConvertido = `https://googleusercontent.com{id}`;
      }
  }

  // Envia para o WebApp com o link já transformado
  try {
    await fetch("https://google.com", {
      method: "POST",
      mode: "no-cors", // Mantemos o no-cors para evitar erro de redirecionamento
      body: JSON.stringify({ 
        acao: "atualizarFoto", 
        nome: nome, 
        senha: senha, 
        foto: linkConvertido // Envia o link já pronto para ser imagem
      })
    });

    alert("Solicitação enviada com o link convertido! Verifique a planilha em instantes.");
  } catch (erro) {
    alert("Erro ao enviar. Tente novamente.");
    console.error(erro);
  }
}



   </script>
 </body>
