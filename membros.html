  //===========================================================================================================================================//  
 async function carregarMembros() {
  const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTfXdUtm1B53gPy7DY3wWI1GHr3Ucg-cFHmhcMeWIL-E_v3pbDMUhz0N2S72yYYnygYRBb171d0p98y/pub?gid=760823650&single=true&output=csv";
  
  try {
    const response = await fetch(url);
    const data = await response.text();
    
    // Divide por linhas e limpa espaços
    const linhas = data.split(/\r?\n/).filter(l => l.trim() !== "");
    let html = "";

    for (let i = 1; i < linhas.length; i++) {
      const colunas = linhas[i].split(",");
      
      if (colunas.length >= 2) {
        const nome = colunas[0].replace(/"/g, "").trim();
        const posicao = colunas[1].replace(/"/g, "").trim();
        let imagemRaw = colunas[2] ? colunas[2].replace(/"/g, "").trim() : "";

        // Tenta converter o link do Drive se ele existir
        let imagemFinal = "https://flaticon.com"; // Padrão
        
        if (imagemRaw.includes("://google.com")) {
            const idMatch = imagemRaw.match(/\/d\/([^\/]+)/) || imagemRaw.match(/id=([^&]+)/);
            if (idMatch) {
                imagemFinal = `https://://google.com/uc?export=view&id=${idMatch[1]}`;
            }
        } else if (imagemRaw.startsWith("http")) {
            imagemFinal = imagemRaw;
        }

        html += `
          <div class="membro-card">
            <div style="width:120px; height:120px; margin: 0 auto 10px; overflow:hidden; border-radius:50%; border:3px solid #ff6600; background: #222;">
                <img src="${imagemFinal}" 
                     alt="${nome}" 
                     style="width:100%; height:100%; object-fit:cover;"
                     referrerpolicy="no-referrer">
            </div>
            <h3 style="color:#fff; margin:5px 0;">${nome}</h3>
            <p style="color:#ffd700; font-size: 0.9em;">${posicao}</p>
          </div>
        `;
      }
    }
    
    document.getElementById("lista-membros").innerHTML = html;

  } catch (erro) {
    console.error("Erro:", erro);
    document.getElementById("lista-membros").innerHTML = "<p>Erro ao carregar os ninjas.</p>";
  }
}

//==========================================================================carregar foto================================================//
async function atualizarFoto() {
  const nome = document.getElementById("upNome").value;
  const senha = document.getElementById("upSenha").value;
  let linkOriginal = document.getElementById("upLink").value.trim();

  if (!nome || !senha || !linkOriginal) return alert("Preencha tudo!");

  let linkConvertido = linkOriginal;

  // Ajuste na conversão do link para salvar na planilha
  if (linkOriginal.includes("drive.google.com")) {
      const idMatch = linkOriginal.match(/\/d\/([^\/]+)/) || linkOriginal.match(/id=([^&]+)/);
      if (idMatch && idMatch[1]) {
          linkConvertido = `https://google.com{idMatch[1]}`;
      }
  }

  try {
    // Aqui use o link real do seu WebApp do Google (AKfycb...)
    await fetch("https://google.com", {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify({ 
        acao: "atualizarFoto", 
        nome: nome, 
        senha: senha, 
        foto: linkConvertido 
      })
    });

    alert("Solicitação enviada! Se os dados estiverem certos, a foto atualizará em breve.");
  } catch (erro) {
    alert("Erro ao enviar. Tente novamente.");
  }
}
