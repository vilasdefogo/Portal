<!DOCTYPE html>
<html lang="pt-BR">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos - Vilas de Fogo</title>
    <link rel="stylesheet" href="style.css"> <!-- usa o mesmo CSS do portal -->
    <nav>
        <div class="menu-links">
          <a href="portal.html">Home</a>
          <a href="membros.html" class="active">Membros</a>
          <a href="batalhas.html">Batalhas</a>
          <a href="eventos.html">Eventos</a>
          <a href="ranking.html">Ranking</a>
          <a href="equipes.html">Equipes</a>
        </div>
      <a href="index.html" class="btn-sair">Sair</a>
     </nav>
 </head>
 <body>
   <header>
   <img src="assets/imagens/LOGO2.png" alt="Logo Fogo" class="logo-fogo">
   </header>
   
   <main>
     
  
  <h2 class="titulo-bady">Membros do Clã</h2>
  <div id="lista-membros" class="membros-container"></div>

<div class="atualizar-foto">
  <h3>Atualizar minha Foto</h3>
  <input type="text" id="upNome" placeholder="Seu Nome">
  <input type="password" id="upSenha" placeholder="Sua Senha">
  <input type="text" id="upLink" placeholder="Link da Imagem (URL)">
  <button onclick="atualizarFoto()">Atualizar Perfil</button>
</div>

   </main>
   <script>


  //===========================================================================================================================================//  
    async function carregarMembros() {
  const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTfXdUtm1B53gPy7DY3wWI1GHr3Ucg-cFHmhcMeWIL-E_v3pbDMUhz0N2S72yYYnygYRBb171d0p98y/pub?gid=760823650&single=true&output=csv"; // link CSV da aba Membros
  const response = await fetch(url);
  const data = await response.text();
  const linhas = data.split("\n").map(l => l.split(","));

  let html = "";
  for (let i = 1; i < linhas.length; i++) {
    const nome = linhas[i][0];
    const posicao = linhas[i][1];
    const imagem = linhas[i][2]; // nova coluna "Imagem" com URL
    html += `
      <div class="membro-card">
       <img src="${imagem}" alt="${nome}" alt="${posicao}" class="membro-avatar">
        <h3>${nome}</h3>
        <h3>Posição: ${posicao}</h3>
      </div>
    `;
  }
  document.getElementById("lista-membros").innerHTML = html;
}

carregarMembros();
    //==========================================================================carregar foto================================================//
    async function atualizarFoto() {
  const nome = document.getElementById("upNome").value;
  const senha = document.getElementById("upSenha").value;
  const link = document.getElementById("upLink").value;

  if (!nome || !senha || !link) return alert("Preencha tudo!");

  // Envia para o mesmo WebApp que já criamos
  await fetch("TEU_LINK_DO_GOOGLE_SCRIPT_EXEC", {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({ 
      acao: "atualizarFoto", 
      nome: nome, 
      senha: senha, 
      foto: link 
    })
  });

  alert("Solicitação enviada! Aguarde a atualização.");
}

   </script>
 </body>
</html>
